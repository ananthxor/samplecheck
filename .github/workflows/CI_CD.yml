name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env from .env.example
        # Use secrets for real deployment, but for CI build check we use example values
        run: cp .env.example .env

      - name: Type Check
        run: pnpm typecheck

      - name: Build Project
        run: pnpm build

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: studio_scrolltoday_com:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    needs: [build-and-test, docker-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: SSH_PRIVATE_KEY
          script: |
            set -e

            echo "Preparing SSH..."
            mkdir -p ~/.ssh
            echo "$SSH_PRIVATE_KEY" > ~/.ssh/st_creative_studio
            chmod 600 ~/.ssh/st_creative_studio
            ssh-keyscan github.com >> ~/.ssh/known_hosts

            # force git to use correct ssh key
            export GIT_SSH_COMMAND="ssh -i ~/.ssh/st_creative_studio -o IdentitiesOnly=yes"

            cd /home/ananth
            PROJECT_DIR="st-creative-studio"

            if [ -d "$PROJECT_DIR/.git" ]; then
              cd $PROJECT_DIR
              echo "Repository exists. Updating code..."
              git fetch origin
              git reset --hard origin/main
              git clean -fd
            elif [ -d "$PROJECT_DIR" ]; then
              echo "Directory exists but not a git repo. Removing..."
              rm -rf $PROJECT_DIR
              git clone git@github.com:scrolltoday/st-creative-studio.git $PROJECT_DIR
              cd $PROJECT_DIR
            else
              echo "Cloning repository..."
              git clone git@github.com:scrolltoday/st-creative-studio.git $PROJECT_DIR
              cd $PROJECT_DIR
            fi

            echo "Injecting production environment variables..."
            # Note: Production secrets should be managed on the server or via GitHub Secrets
            echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
            echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
            echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env
            echo "SUPABASE_DB_PASSWORD=${{ secrets.SUPABASE_DB_PASSWORD }}" >> .env
            echo "VITE_SERVE_BASE_URL=${{ secrets.VITE_SERVE_BASE_URL }}" >> .env
            echo "VITE_CREATIVE_CDN_BASE=${{ secrets.VITE_CREATIVE_CDN_BASE }}" >> .env
            echo "PORT=${{ secrets.PORT }}" >> .env
            echo "VITE_PORT=${{ secrets.VITE_PORT }}" >> .env
            
            # Also create .env.development if the Dockerfile specifically expects it
            cp .env .env.development

            echo "Stopping containers..."
            docker compose -p studio_scrolltoday_com down --remove-orphans
            docker rm -f studio-scrolltoday-com 2>/dev/null || true

            echo "Building and starting containers..."
            docker compose -p studio_scrolltoday_com up -d --build

            echo "Cleaning old images..."
            docker image prune -f --filter "label=com.docker.compose.project=studio_scrolltoday_com"

            echo "Deployment successful"
